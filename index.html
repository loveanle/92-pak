<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery Center</title>

<style>
:root{
    --bg:#050507;
    --card:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.12);
    --text:#fff;
    --accent:linear-gradient(45deg,#ff0000,#ff6a00);
}

/* BASE */
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    font-family: 'Inter', system-ui, sans-serif;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,0,0,0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,100,255,0.08), transparent 40%),
        var(--bg);
    color:var(--text);
    padding:16px;
}

/* TITLE */
h1{
    font-size:2rem;
    text-align:center;
    margin:20px 0 25px;
    background: linear-gradient(90deg,#fff,#aaa,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* GRID */
.app-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

/* CARD */
.card{
    position:relative;
    padding:18px;
    border-radius:20px;
    background:var(--card);
    backdrop-filter: blur(14px);
    border:1px solid var(--border);
    transition:0.35s ease;
}

/* GLOW EDGE */
.card::before{
    content:"";
    position:absolute;
    inset:-1px;
    border-radius:20px;
    background:linear-gradient(45deg,red,blue,green);
    opacity:0.25;
    z-index:-1;
    filter:blur(12px);
}

/* ICON + TITLE */
.icon{
    width:85px;
    height:85px;
    border-radius:18px;
    display:block;
    margin-bottom:10px;
}

.app-name{
    font-size:1.3rem;
    font-weight:700;
    margin-bottom:12px;
}

/* SCREENSHOTS */
.screenshots{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:5px;
}

.screenshots img{
    width:120px;
    height:200px;
    border-radius:14px;
    flex-shrink:0;
    object-fit:cover;
    transition:0.3s;
}

/* tap feedback instead of crazy zoom */
.screenshots img:active{
    transform:scale(0.95);
}

/* FEATURES */
.features{
    margin-top:15px;
    font-size:0.95rem;
    color:#bbb;
    line-height:1.5;
}

/* BUTTONS */
.btn-group{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:18px;
}

.btn{
    padding:14px;
    border-radius:14px;
    text-decoration:none;
    font-weight:700;
    text-align:center;
    font-size:0.95rem;
}

/* PRIMARY CTA */
.btn-download{
    background:var(--accent);
    color:#fff;
    box-shadow:0 8px 25px rgba(255,0,0,0.4);
}

/* SECONDARY */
.btn-community{
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.15);
    color:#fff;
}

/* TOUCH FEEDBACK */
.btn:active{
    transform:scale(0.97);
}

/* DESKTOP ENHANCE */
@media(min-width:700px){
    body{
        padding:30px;
    }

    h1{
        font-size:2.6rem;
    }

    .app-grid{
        grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    }

    .card{
        padding:25px;
    }
}
</style>
</head>

<body>

<h1>Discovery Center</h1>

<div class="app-grid">

<div class="card">

    <img src="icon.png" class="icon">

    <div class="app-name">92PAK HACK PRO</div>

    <div class="screenshots">
        <img src="screenshot/herohack.jpg">
        <img src="screenshot/herohack2.jpg">
    </div>

    <div class="features">
        🎯 Colour Prediction Hack<br>
        💎 Free Lifetime Access<br>
        📈 High Accuracy<br>
        ⚡ Unlimited Usage
    </div>

    <div class="btn-group">
        <a href="92 Pak Ai Tool.apk" class="btn btn-download">⬇ Download APK</a>
        <a href="https://www.whatsapp.com/channel/0029VbBoppg9cDDWApy7CC2C" class="btn btn-community">💬 Join Community</a>
    </div>

</div>

</div>

</body>
</html>
