<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery Center</title>

<style>
:root{
    --bg:#050507;
    --card:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.15);
    --text:#fff;
}

/* BODY */
body{
    margin:0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 20% 30%, rgba(255,0,0,0.08), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0,100,255,0.08), transparent 40%),
                var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

/* TITLE */
h1{
    font-size:2.8rem;
    margin:30px 0;
    background: linear-gradient(90deg,#fff,#aaa,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: shine 3s infinite linear;
}
@keyframes shine{
    0%{background-position:-200px}
    100%{background-position:200px}
}

/* GRID */
.app-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
    width:100%;
    max-width:1200px;
}

/* CARD */
.card{
    position:relative;
    padding:25px;
    border-radius:25px;
    background:var(--card);
    backdrop-filter: blur(15px);
    border:1px solid var(--border);
    transition:0.4s;
    overflow:hidden;
}

/* GLOW BORDER */
.card::before{
    content:"";
    position:absolute;
    inset:-1px;
    border-radius:25px;
    padding:1px;
    background:linear-gradient(45deg,red,blue,green);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    opacity:0.4;
}

/* HOVER EFFECT */
.card:hover{
    transform: translateY(-12px) scale(1.02);
}

/* ICON */
.icon{
    width:110px;
    height:110px;
    border-radius:25px;
    margin-bottom:15px;
}

/* NAME */
.app-name{
    font-size:1.6rem;
    font-weight:800;
}

/* SCREENSHOTS */
.screenshots{
    display:flex;
    gap:10px;
    margin:20px 0;
}
.screenshots img{
    width:90px;
    height:150px;
    border-radius:12px;
    transition:0.3s;
}
.screenshots img:hover{
    transform: scale(1.7);
    z-index:5;
}

/* FEATURES */
.features{
    text-align:left;
    font-size:0.9rem;
    color:#aaa;
}

/* BUTTONS */
.btn{
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    font-weight:700;
    text-align:center;
    transition:0.3s;
}

/* DOWNLOAD BUTTON */
.btn-download{
    background:linear-gradient(45deg,#ff0000,#ff6a00);
    box-shadow:0 0 20px rgba(255,0,0,0.5);
    color:#fff;
}
.btn-download:hover{
    transform:scale(1.05);
}

/* COMMUNITY BUTTON */
.btn-community{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    color:#fff;
}
.btn-community:hover{
    background:rgba(255,255,255,0.15);
}

/* BUTTON GROUP */
.btn-group{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:20px;
}

</style>
</head>

<body>

<h1>Discovery Center</h1>

<div class="app-grid">

<div class="card">
    <img src="icon.png" class="icon">

    <div class="app-name">92PAK HACK PRO</div>

    <div class="screenshots">
        <img src="screenshot/herohack.jpg">
        <img src="screenshot/herohack2.jpg">
    </div>

    <div class="features">
        <p>🎯 Colour Prediction Hack</p>
        <p>💎 Free Lifetime Access</p>
        <p>📈 High Accuracy</p>
        <p>⚡ Unlimited Usage</p>
    </div>

    <div class="btn-group">
        <a href="92 Pak Ai Tool.apk" class="btn btn-download">⬇ Download APK</a>
        <a href="https://www.whatsapp.com/channel/0029VbBoppg9cDDWApy7CC2C" class="btn btn-community">💬 Join Community</a>
    </div>
</div>

</div>

</body>
</html>
